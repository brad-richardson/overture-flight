name: Deploy

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, closed]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy-main:
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    concurrency:
      group: gh-pages
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_BASE_PATH: /overture-flight/
          VITE_PARTYKIT_HOST: flight-sim.brad-richardson.partykit.dev

      - name: Verify production entry asset
        run: |
          entry_asset=$(grep -o 'assets/index-[^" ]*\.js' dist/index.html | head -1)
          test -n "$entry_asset"
          test -f "dist/$entry_asset"

      - name: Deploy to GitHub Pages with retry
        run: |
          set -e
          echo "Saving dist..."
          cp -r dist /tmp/dist
          ls /tmp/dist | head -20

          git config user.name "brad-richardson"
          git config user.email "brad-richardson@users.noreply.github.com"

          echo "Fetching gh-pages..."
          git fetch origin gh-pages || echo "gh-pages branch doesn't exist yet, will create"

          if git show-ref --verify --quiet refs/heads/gh-pages; then
            git checkout gh-pages
          elif git show-ref --verify --quiet refs/remotes/origin/gh-pages; then
            git checkout -b gh-pages origin/gh-pages
          else
            echo "Creating orphan gh-pages branch"
            git checkout --orphan gh-pages
            git rm -rf . || true
          fi

          echo "Syncing dist to gh-pages root (preserving pr-preview)..."
          # Build and checkout can stamp same-size HTML within the same second.
          # Checksums prevent rsync's quick check from retaining a stale
          # index.html while replacing its hashed assets.
          rsync -avc --delete --exclude='.git' --exclude='pr-preview' /tmp/dist/ ./

          entry_asset=$(grep -o 'assets/index-[^" ]*\.js' index.html | head -1)
          test -n "$entry_asset"
          test -f "$entry_asset"

          git add -A

          if git diff --cached --quiet; then
            echo "No changes to deploy"
            exit 0
          fi

          git commit -m "deploy: $GITHUB_SHA"

          echo "Pushing with retry loop..."
          for i in 1 2 3 4 5; do
            echo "Push attempt $i/5"
            if git push origin gh-pages; then
              echo "Deploy succeeded"
              exit 0
            fi
            echo "Push failed, rebasing onto latest gh-pages..."
            sleep $((i*2))
            git fetch origin gh-pages
            # Rebase our commit onto latest remote, preserving our dist sync
            if ! git rebase origin/gh-pages; then
              echo "Rebase conflict, resetting and re-applying dist..."
              git rebase --abort || true
              git reset --hard origin/gh-pages
              rsync -avc --delete --exclude='.git' --exclude='pr-preview' /tmp/dist/ ./
              entry_asset=$(grep -o 'assets/index-[^" ]*\.js' index.html | head -1)
              test -n "$entry_asset"
              test -f "$entry_asset"
              git add -A
              if git diff --cached --quiet; then
                echo "No changes after rebase, already deployed"
                exit 0
              fi
              git commit -m "deploy: $GITHUB_SHA" || true
            fi
          done

          echo "Failed to push after 5 attempts"
          exit 1

  deploy-preview:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    concurrency:
      group: gh-pages
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        if: github.event.action != 'closed'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        if: github.event.action != 'closed'
        run: npm ci

      - name: Build
        if: github.event.action != 'closed'
        run: npm run build
        env:
          VITE_BASE_PATH: /${{ github.event.repository.name }}/pr-preview/pr-${{ github.event.number }}/
          VITE_PARTYKIT_HOST: flight-sim.brad-richardson.partykit.dev

      - name: Deploy PR Preview
        if: github.event.action == 'closed' || success()
        uses: rossjrw/pr-preview-action@v1
        with:
          source-dir: ./dist
          preview-branch: gh-pages
          umbrella-dir: pr-preview
          action: auto
